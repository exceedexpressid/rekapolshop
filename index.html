<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Rekap - Exceed Express</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Pustaka React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Pustaka Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PUSTAKA UNTUK EXPORT JPG & PDF -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Arial', sans-serif; color: #000; }
        
        /* CSS KHUSUS UNTUK PRINT KERTAS */
        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background-color: #fff; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .cetak-container { box-shadow: none !important; margin: 0 !important; padding: 0 !important; width: 100% !important; max-width: 100% !important;}
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        /* Tabel ala Excel */
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 4px 6px; }
        .excel-table th { background-color: #f3f4f6; text-align: center; font-weight: bold; }
        
        .box-summary { border: 1px solid #000; font-size: 12px; font-weight: bold; background-color: #fff; }
        .box-summary td { border: 1px solid #000; padding: 4px 8px; }

        /* Loading Overlay saat export */
        #export-loading {
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="antialiased">
    
    <div id="export-loading">
        <i class="fas fa-circle-notch fa-spin text-4xl text-orange-500 mb-4"></i>
        <h2 class="text-xl font-bold text-slate-800">Mempersiapkan Dokumen...</h2>
        <p class="text-slate-500 text-sm mt-1">Harap tunggu, jangan tutup halaman ini.</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // =================================================================================
        // PASTE URL GOOGLE SCRIPT ANDA DI BAWAH INI
        // =================================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec"; 

        const formatCurr = (amount) => {
            if (!amount) return '-';
            return new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0 }).format(amount);
        };

        const getFinancials = (pkg) => {
            const hBarang = Number(pkg.hargaPaket) || 0;
            const tagihan = Number(pkg.totalTagihan) || 0;
            const oTambahan = Number(pkg.tambahanOngkir) || 0;
            let oDasar = Number(pkg.ongkirDasar) || 0;
            if (oDasar === 0) oDasar = (tagihan - hBarang > 0 ? tagihan - hBarang : 0) - oTambahan;
            return { hBarang, tagihan, oDasar: Math.max(0, oDasar), oTambahan, oTotal: Math.max(0, oDasar) + oTambahan };
        };

        function App() {
            const [packages, setPackages] = useState([]);
            const [olshopList, setOlshopList] = useState([]);
            const [kurirList, setKurirList] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            
            const [rekapMode, setRekapMode] = useState('olshop');
            const [selectedValue, setSelectedValue] = useState('');
            const [selectedDate, setSelectedDate] = useState('');

            const printAreaRef = useRef(null);

            const syncData = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const result = await response.json();
                    if (result.status === 'success') {
                        const pkgs = result.data.packages || [];
                        setPackages(pkgs);
                        const olshops = [...new Set(pkgs.map(p => String(p.olshopName).trim().toUpperCase()))].filter(Boolean).sort();
                        const kurirs = [...new Set(pkgs.map(p => String(p.kurirId || '').split('@')[0].trim().toUpperCase()))].filter(Boolean).sort();
                        setOlshopList(olshops);
                        setKurirList(kurirs);
                    } else { alert("Gagal memuat data dari server."); }
                } catch (error) { alert("Koneksi error. Gagal menarik data."); } 
                finally { setIsLoading(false); }
            };

            useEffect(() => { syncData(); }, []);

            // =================================================================================
            // LOGIKA AKUNTANSI (SINKRON 100% DENGAN MASTER ADMIN & APPSHEET)
            // =================================================================================
            const { filteredData, summary } = useMemo(() => {
                let filtered = packages;
                
                if (selectedValue) {
                    if (rekapMode === 'olshop') {
                        filtered = filtered.filter(p => String(p.olshopName).trim().toUpperCase() === selectedValue);
                    } else {
                        filtered = filtered.filter(p => String(p.kurirId || '').split('@')[0].trim().toUpperCase() === selectedValue);
                    }
                } else { filtered = []; }

                if (selectedDate) {
                    filtered = filtered.filter(p => {
                        let pDateStr = p.dateString || p.tanggal || '';
                        if (!pDateStr) return false;
                        try {
                            const d = new Date(pDateStr);
                            if (!isNaN(d.getTime())) {
                                const y = d.getFullYear();
                                const m = String(d.getMonth() + 1).padStart(2, '0');
                                const day = String(d.getDate()).padStart(2, '0');
                                return `${y}-${m}-${day}` === selectedDate;
                            }
                            return pDateStr.split('T')[0] === selectedDate;
                        } catch(e) { return false; }
                    });
                }

                let s_sukses = 0, s_pending = 0, s_cancel = 0;
                let setoran = 0; 
                let tfVolume = 0; 
                let sudahSetor = 0; 

                filtered.forEach(pkg => {
                    const stat = String(pkg.status).toLowerCase().replace(' ', '_');
                    const metode = String(pkg.metodeBayar).trim().toUpperCase();
                    const isCair = String(pkg.statusPencairan).toLowerCase() === 'cair';
                    const { hBarang, oDasar, oTambahan, oTotal } = getFinancials(pkg);

                    if (stat === 'sukses') {
                        s_sukses++;
                        let currentSetoran = 0;
                        let currentTfVolume = 0;

                        if (rekapMode === 'olshop') {
                            // --- LOGIKA OLSHOP ---
                            // Setoran = Harga Barang (Untuk paket CASH, COD, TF KANTOR)
                            if (metode === 'CASH' || metode === 'COD' || metode === 'TF KANTOR') {
                                currentSetoran = hBarang;
                            }
                            // TF/Volume = Ongkir Dasar + Tambahan (Hanya jika TF OLSHOP)
                            if (metode === 'TF OLSHOP') {
                                currentTfVolume = oTotal;
                            }
                        } else {
                            // --- LOGIKA KURIR ---
                            // Setoran = Harga Barang + Ongkir Dasar (Uang fisik yang dipegang kurir dari paket CASH/COD)
                            if (metode === 'CASH' || metode === 'COD') {
                                currentSetoran = hBarang + oDasar;
                            }
                            // Potongan Hak = Ongkir Tambahan (Hak kurir yang dipotong kantor karena metode TF)
                            if (metode === 'TF OLSHOP' || metode === 'TF KANTOR') {
                                currentTfVolume = oTambahan;
                            }
                        }

                        setoran += currentSetoran;
                        tfVolume += currentTfVolume;

                        // SUDAH SETOR / CAIR
                        if (isCair) {
                            sudahSetor += (currentSetoran - currentTfVolume);
                        }

                    } else if (stat === 'pending' || stat === 'siap_antar' || stat === 'proses') { 
                        s_pending++; 
                    } else if (stat === 'cancel') { 
                        s_cancel++; 
                    }
                });

                const estimasiSetoran = setoran - tfVolume;

                return {
                    filteredData: filtered,
                    summary: { sukses: s_sukses, pending: s_pending, cancel: s_cancel, setoran, tfVolume, estimasiSetoran, sudahSetor }
                };
            }, [packages, rekapMode, selectedValue, selectedDate]);

            const getIndoDate = (dateStr) => {
                if(!dateStr) return '-';
                try {
                    const d = new Date(dateStr);
                    const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
                    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
                } catch(e) { return dateStr; }
            };

            const executeExport = async (format) => {
                if (!printAreaRef.current) return;
                const loadingEl = document.getElementById('export-loading');
                loadingEl.style.display = 'flex'; 

                setTimeout(async () => {
                    try {
                        const element = printAreaRef.current;
                        const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                        const imgData = canvas.toDataURL('image/jpeg', 1.0);
                        const fileName = `Rekap_${rekapMode.toUpperCase()}_${selectedValue.replace(/\s+/g, '_')}_${selectedDate || 'Semua'}`;

                        if (format === 'jpg') {
                            const link = document.createElement('a');
                            link.href = imgData;
                            link.download = `${fileName}.jpg`;
                            link.click();
                        } else if (format === 'pdf') {
                            const { jsPDF } = window.jspdf;
                            const pdf = new jsPDF('l', 'mm', 'a4');
                            const pdfWidth = pdf.internal.pageSize.getWidth();
                            const pdfHeight = pdf.internal.pageSize.getHeight();
                            const imgProps = pdf.getImageProperties(imgData);
                            const ratio = imgProps.width / imgProps.height;
                            
                            let finalWidth = pdfWidth - 20; 
                            let finalHeight = finalWidth / ratio;

                            if (finalHeight > (pdfHeight - 20)) {
                                finalHeight = pdfHeight - 20;
                                finalWidth = finalHeight * ratio;
                            }

                            const marginX = (pdfWidth - finalWidth) / 2;
                            const marginY = 10;

                            pdf.addImage(imgData, 'JPEG', marginX, marginY, finalWidth, finalHeight);
                            pdf.save(`${fileName}.pdf`);
                        }
                    } catch (err) {
                        console.error("Gagal export:", err);
                        alert("Terjadi kesalahan saat memproses. Pastikan koneksi stabil.");
                    } finally {
                        loadingEl.style.display = 'none';
                    }
                }, 500);
            };

            return (
                <div className="min-h-screen pb-10">
                    <div className="no-print bg-slate-800 text-white p-4 shadow-md sticky top-0 z-50 flex flex-col lg:flex-row gap-4 justify-between items-center mb-6">
                        <div className="flex items-center gap-3 w-full lg:w-auto">
                            <div className="bg-orange-500 p-2 rounded-lg"><i className="fas fa-file-invoice text-xl"></i></div>
                            <div>
                                <h1 className="font-bold text-lg leading-tight">Mesin Cetak Rekap (A4)</h1>
                                <p className="text-xs text-slate-300">Exceed Express Ekspedisi</p>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                            <div className="flex bg-slate-900 rounded-lg p-1 border border-slate-700 w-full sm:w-auto">
                                <button onClick={() => { setRekapMode('olshop'); setSelectedValue(''); }} className={`flex-1 px-4 py-1.5 text-xs font-bold rounded transition-colors ${rekapMode === 'olshop' ? 'bg-orange-500 text-white shadow-sm' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="fas fa-store mr-1.5"></i> Rekap Olshop
                                </button>
                                <button onClick={() => { setRekapMode('kurir'); setSelectedValue(''); }} className={`flex-1 px-4 py-1.5 text-xs font-bold rounded transition-colors ${rekapMode === 'kurir' ? 'bg-orange-500 text-white shadow-sm' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="fas fa-motorcycle mr-1.5"></i> Rekap Kurir
                                </button>
                            </div>

                            <select value={selectedValue} onChange={(e) => setSelectedValue(e.target.value)} className="bg-slate-700 border border-slate-600 rounded p-2 text-sm outline-none w-full sm:w-48 font-bold text-orange-300">
                                <option value="">-- Pilih {rekapMode === 'olshop' ? 'Olshop' : 'Kurir'} --</option>
                                {(rekapMode === 'olshop' ? olshopList : kurirList).map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                            </select>

                            <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="bg-slate-700 border border-slate-600 rounded p-2 text-sm outline-none w-full sm:w-auto text-orange-300" />

                            <button onClick={syncData} disabled={isLoading} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-bold w-full sm:w-auto border border-blue-500">
                                {isLoading ? <i className="fas fa-spin fa-sync-alt"></i> : <i className="fas fa-cloud-download-alt"></i>}
                            </button>
                            
                            <div className="flex bg-slate-900 p-1 rounded-lg border border-slate-700 w-full sm:w-auto">
                                <button onClick={() => executeExport('jpg')} disabled={!selectedValue || filteredData.length === 0} className={`px-3 py-1.5 text-xs font-bold rounded flex flex-1 items-center justify-center ${!selectedValue || filteredData.length === 0 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-700 text-blue-400'}`}><i className="fas fa-image mr-1.5"></i> JPG</button>
                                <button onClick={() => executeExport('pdf')} disabled={!selectedValue || filteredData.length === 0} className={`px-3 py-1.5 text-xs font-bold rounded flex flex-1 items-center justify-center border-l border-slate-700 ${!selectedValue || filteredData.length === 0 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-700 text-red-400'}`}><i className="fas fa-file-pdf mr-1.5"></i> PDF</button>
                                <button onClick={() => window.print()} disabled={!selectedValue || filteredData.length === 0} className={`px-4 py-1.5 text-xs font-bold rounded flex flex-1 items-center justify-center border-l border-slate-700 ${!selectedValue || filteredData.length === 0 ? 'opacity-50 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-500 text-white'}`}><i className="fas fa-print mr-1.5"></i> Print</button>
                            </div>
                        </div>
                    </div>

                    {!selectedValue ? (
                        <div className="no-print text-center text-gray-500 mt-20">
                            <i className={`fas ${rekapMode === 'olshop' ? 'fa-store' : 'fa-motorcycle'} text-4xl mb-3`}></i>
                            <p>Silakan pilih <b>Nama {rekapMode === 'olshop' ? 'Olshop' : 'Kurir'}</b> di panel atas untuk melihat laporan.</p>
                        </div>
                    ) : (
                        <div ref={printAreaRef} className="cetak-container bg-white mx-auto max-w-[1150px] p-6 sm:p-8 shadow-xl border border-gray-200 flex flex-col min-h-full">
                            
                            <div className="flex justify-between items-start mb-6 gap-4">
                                <div className="flex items-center gap-4">
                                    <div className="flex flex-col items-center">
                                        <div className="w-[120px] shrink-0 border border-slate-200 rounded p-1 bg-slate-50 flex items-center justify-center">
                                            <img src="https://drive.google.com/uc?id=1xBkWoexBfNOe8WKhDp8WBkh7hjvK4Yub" crossOrigin="anonymous" alt="Exceed Logo" className="w-full h-auto object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                                            <div style={{display: 'none'}} className="w-full h-[50px] bg-[#0f172a] flex-col justify-center items-center text-white italic rounded-sm">
                                                <span className="text-xl font-black text-orange-500">e<span className="text-blue-300">X</span></span>
                                            </div>
                                        </div>
                                        <span className="text-[10px] font-bold italic text-slate-700 mt-1.5 whitespace-nowrap">"Antar tuntas harga pas"</span>
                                    </div>

                                    <div className="flex flex-col gap-1">
                                        <div className="border border-black px-4 py-1.5 font-bold text-sm min-w-[250px] uppercase bg-gray-50 flex items-center">
                                            <span className="text-[10px] text-gray-500 mr-2 border-r border-gray-400 pr-2">{rekapMode === 'olshop' ? 'OLSHOP' : 'KURIR'}</span>
                                            {selectedValue}
                                        </div>
                                        <div className="border border-black px-4 py-1.5 text-sm font-semibold min-w-[250px]">
                                            {selectedDate ? getIndoDate(selectedDate) : 'Semua Tanggal'}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-4">
                                    <table className="box-summary w-[260px]">
                                        <tbody>
                                            <tr>
                                                <td className="bg-gray-100 w-[140px]">{rekapMode === 'olshop' ? 'Setoran' : 'Setoran (Fisik Cash)'}</td>
                                                <td className="text-right w-[120px]">{formatCurr(summary.setoran)}</td>
                                            </tr>
                                            <tr>
                                                <td className="bg-gray-100">{rekapMode === 'olshop' ? 'TF/VOLUME' : 'Minus Hak (TF/Vol)'}</td>
                                                <td className="text-right text-red-600">{formatCurr(summary.tfVolume)}</td>
                                            </tr>
                                            <tr>
                                                <td className="bg-gray-100">{rekapMode === 'olshop' ? 'Estimasi Setoran' : 'Total Wajib Setor'}</td>
                                                <td className="text-right text-blue-600">{formatCurr(summary.estimasiSetoran)}</td>
                                            </tr>
                                            <tr>
                                                <td className="bg-gray-100">SUDAH SETOR</td>
                                                <td className="text-right text-emerald-600">{formatCurr(summary.sudahSetor)}</td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <table className="box-summary w-[120px]">
                                        <tbody>
                                            <tr><td className="bg-green-400 text-green-900 text-center uppercase tracking-wider">SUKSES</td><td className="text-center font-black text-lg w-[40px]">{summary.sukses}</td></tr>
                                            <tr><td className="bg-yellow-400 text-yellow-900 text-center uppercase tracking-wider">PENDING</td><td className="text-center font-black text-lg">{summary.pending}</td></tr>
                                            <tr><td className="bg-red-500 text-white text-center uppercase tracking-wider">CANCEL</td><td className="text-center font-black text-lg">{summary.cancel}</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <table className="excel-table">
                                <thead>
                                    <tr>
                                        <th className="w-8">NO</th>
                                        <th className="w-32">Nama Customer</th>
                                        <th className="w-24">No HP Customer</th>
                                        <th className="w-48">Alamat Lengkap</th>
                                        <th className="w-20">Harga Paket</th>
                                        <th className="w-20">Ongkir Dasar</th>
                                        <th className="w-20">Tambahan Ongkir</th>
                                        <th className="w-20">Total Tagihan</th>
                                        <th className="w-20">Status</th>
                                        <th className="w-20">Metode Bayar</th>
                                        <th className="w-28">{rekapMode === 'olshop' ? 'Kurir ID' : 'Nama Olshop'}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.length === 0 ? (
                                        <tr><td colSpan="11" className="text-center py-4 text-gray-500 font-bold">Tidak ada data untuk laporan ini.</td></tr>
                                    ) : (
                                        filteredData.map((pkg, idx) => {
                                            const stat = String(pkg.status).toUpperCase();
                                            const isPending = stat === 'PENDING' || stat === 'SIAP_ANTAR' || stat === 'PROSES';
                                            const isCancel = stat === 'CANCEL';
                                            const { hBarang, tagihan, oDasar, oTambahan } = getFinancials(pkg);

                                            return (
                                                <tr key={idx} className={isPending ? "bg-yellow-100" : (isCancel ? "bg-red-100" : "")}>
                                                    <td className="text-center font-bold">{idx + 1}</td>
                                                    <td>{pkg.customerName}</td>
                                                    <td className="text-center">{pkg.customerPhone || '-'}</td>
                                                    <td>{pkg.address}</td>
                                                    <td className="text-right">{hBarang === 0 ? '-' : formatCurr(hBarang)}</td>
                                                    <td className="text-right">{oDasar === 0 ? '-' : formatCurr(oDasar)}</td>
                                                    <td className="text-right">{oTambahan === 0 ? '-' : formatCurr(oTambahan)}</td>
                                                    <td className="text-right font-bold">{tagihan === 0 ? '-' : formatCurr(tagihan)}</td>
                                                    <td className={`text-center font-bold ${isPending ? 'bg-yellow-400 text-yellow-900' : (isCancel ? 'bg-red-600 text-white' : 'text-green-700')}`}>
                                                        {stat === 'SIAP_ANTAR' || stat === 'PROSES' ? 'PENDING' : stat}
                                                    </td>
                                                    <td className="text-center">{pkg.metodeBayar || '-'}</td>
                                                    <td className="text-[10px] uppercase font-bold text-center">
                                                        {rekapMode === 'olshop' ? String(pkg.kurirId || '-').split('@')[0] : pkg.olshopName}
                                                    </td>
                                                </tr>
                                            );
                                        })
                                    )}
                                </tbody>
                            </table>

                            <div className="mt-8 text-center text-[11px] font-bold text-slate-600 border-t-2 border-slate-800 pt-3 flex flex-col items-center justify-center">
                                <p className="text-sm text-slate-800">Exceed Express Logistics</p>
                                <p className="font-medium mt-0.5 text-slate-500">Alamat Kantor : Jalan Garuda, BTN Bawah Jayapura, Papua.  No. HP 08215006669</p>
                            </div>

                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
