<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Rekap - Exceed Express</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Pustaka React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Pustaka Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PUSTAKA UNTUK EXPORT JPG & PDF -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Arial', sans-serif; color: #000; overflow-x: hidden; }
        
        /* CSS KHUSUS UNTUK PRINT KERTAS */
        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background-color: #fff; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .cetak-container { box-shadow: none !important; border: none !important; margin: 0 !important; padding: 0 !important; width: 100% !important; max-width: 100% !important;}
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        /* Tabel ala Excel Standar (Untuk Desktop & Print) */
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 4px 6px; }
        .excel-table th { background-color: #f3f4f6; text-align: center; font-weight: bold; }
        
        .box-summary { border: 1px solid #000; font-size: 12px; font-weight: bold; background-color: #fff; }
        .box-summary td { border: 1px solid #000; padding: 4px 8px; }

        /* ========================================================= */
        /* CSS RESPONSIVE MOBILE (Ubah Tabel Jadi Card Tanpa Geser) */
        /* ========================================================= */
        @media screen and (max-width: 768px) {
            .cetak-container { padding: 12px !important; }
            
            /* Mengubah struktur Tabel menjadi Blok (Card) */
            .excel-table, .excel-table tbody, .excel-table tr, .excel-table td {
                display: block;
                width: 100%;
            }
            .excel-table thead { display: none; /* Sembunyikan header tabel di mobile */ }
            
            .excel-table tr { 
                margin-bottom: 16px; 
                border: 2px solid #e5e7eb; 
                border-radius: 8px; 
                background-color: #fff;
                overflow: hidden;
            }
            
            .excel-table td {
                text-align: right !important;
                padding: 8px 12px 8px 50% !important; /* Ruang untuk Label di kiri */
                position: relative;
                border: none !important;
                border-bottom: 1px solid #f3f4f6 !important;
                font-size: 12px;
            }
            .excel-table td:last-child { border-bottom: none !important; }
            
            /* Memunculkan Label Judul di Kiri Setiap Baris menggunakan Data-Label */
            .excel-table td::before {
                content: attr(data-label);
                position: absolute;
                left: 12px;
                width: 45%;
                text-align: left;
                font-weight: bold;
                color: #6b7280;
                white-space: nowrap;
            }

            /* Pewarnaan Khusus Status di Mobile */
            .bg-yellow-100 td { border-bottom-color: #fef08a !important; }
            .bg-red-100 td { border-bottom-color: #fecaca !important; }
        }

        /* Loading Overlay saat export */
        #export-loading {
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="antialiased">
    
    <div id="export-loading">
        <i class="fas fa-circle-notch fa-spin text-4xl text-orange-500 mb-4"></i>
        <h2 class="text-xl font-bold text-slate-800 text-center px-4">Mempersiapkan Dokumen...</h2>
        <p class="text-slate-500 text-sm mt-2 text-center px-4">Harap tunggu, jangan tutup layar. <br/>Mengekstrak data ke format profesional.</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // =================================================================================
        // PASTE URL GOOGLE SCRIPT ANDA DI BAWAH INI
        // =================================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec"; 
        const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

        const formatCurr = (amount) => {
            if (!amount && amount !== 0) return '-';
            if (amount === 0) return '0';
            return new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0 }).format(amount);
        };

        const getFinancials = (pkg) => {
            const hBarang = Number(pkg.hargaPaket) || 0;
            const tagihan = Number(pkg.totalTagihan) || 0;
            const oTambahan = Number(pkg.tambahanOngkir) || 0;
            let oDasar = Number(pkg.ongkirDasar) || 0;
            if (oDasar === 0) oDasar = (tagihan - hBarang > 0 ? tagihan - hBarang : 0) - oTambahan;
            return { hBarang, tagihan, oDasar: Math.max(0, oDasar), oTambahan, oTotal: Math.max(0, oDasar) + oTambahan };
        };

        // Fungsi Penarik Foto dari Server AppSheet
        const getFotoUrl = (pkg) => {
            const fileKey = pkg.fotoBukti || pkg.foto_bukti || pkg.foto || pkg.bukti || pkg.gambar;
            if (!fileKey || String(fileKey).trim() === '') return null;
            if (String(fileKey).startsWith('http://') || String(fileKey).startsWith('https://')) return fileKey;
            return `https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(fileKey)}`;
        };

        function App() {
            const [packages, setPackages] = useState([]);
            const [olshopList, setOlshopList] = useState([]);
            const [kurirList, setKurirList] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            
            const [rekapMode, setRekapMode] = useState('olshop');
            const [selectedValue, setSelectedValue] = useState('');
            
            // FITUR BARU: Pencarian dan Rentang Tanggal
            const [searchQuery, setSearchQuery] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            const [selectedImage, setSelectedImage] = useState(null);

            const printAreaRef = useRef(null);

            const syncData = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const result = await response.json();
                    if (result.status === 'success') {
                        const pkgs = result.data.packages || [];
                        setPackages(pkgs);
                        const olshops = [...new Set(pkgs.map(p => String(p.olshopName).trim().toUpperCase()))].filter(Boolean).sort();
                        const kurirs = [...new Set(pkgs.map(p => String(p.kurirId || '').split('@')[0].trim().toUpperCase()))].filter(Boolean).sort();
                        setOlshopList(olshops);
                        setKurirList(kurirs);
                    } else { alert("Gagal memuat data dari server."); }
                } catch (error) { alert("Koneksi error. Gagal menarik data."); } 
                finally { setIsLoading(false); }
            };

            useEffect(() => { syncData(); }, []);

            // =================================================================================
            // LOGIKA AKUNTANSI & FILTER CANGGIH (SINKRON 100% DENGAN MASTER ADMIN)
            // =================================================================================
            const { filteredData, summary } = useMemo(() => {
                let filtered = packages;
                
                // 1. Filter Olshop/Kurir
                if (selectedValue) {
                    if (rekapMode === 'olshop') {
                        filtered = filtered.filter(p => String(p.olshopName).trim().toUpperCase() === selectedValue);
                    } else {
                        filtered = filtered.filter(p => String(p.kurirId || '').split('@')[0].trim().toUpperCase() === selectedValue);
                    }
                } else { filtered = []; }

                // 2. Filter Pencarian (Search)
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(p => 
                        String(p.customerName).toLowerCase().includes(q) || 
                        String(p.packageId || '').toLowerCase().includes(q) ||
                        String(p.address || '').toLowerCase().includes(q)
                    );
                }

                // 3. Filter Rentang Tanggal (Dengan Pembacaan Cerdas Anti-Error)
                if (startDate || endDate) {
                    filtered = filtered.filter(p => {
                        let pDateStr = p.dateString || p.tanggal || '';
                        if (!pDateStr) return false;
                        let normalizedDateStr = "";
                        try {
                            let d = new Date(pDateStr);
                            // Mengatasi format tanggal DD/MM/YYYY dari AppSheet
                            if (isNaN(d.getTime()) && pDateStr.includes('/')) {
                                const parts = pDateStr.split('/');
                                if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                            }
                            if (!isNaN(d.getTime())) {
                                const year = d.getFullYear();
                                const month = String(d.getMonth() + 1).padStart(2, '0');
                                const day = String(d.getDate()).padStart(2, '0');
                                normalizedDateStr = `${year}-${month}-${day}`;
                            } else {
                                normalizedDateStr = pDateStr.split('T')[0]; 
                            }
                        } catch(e) {
                            normalizedDateStr = pDateStr.split('T')[0];
                        }
                        
                        const sDate = startDate ? startDate : "2000-01-01";
                        const eDate = endDate ? endDate : "2100-01-01";
                        return normalizedDateStr >= sDate && normalizedDateStr <= eDate;
                    });
                }

                let s_sukses = 0, s_pending = 0, s_cancel = 0;
                let setoran = 0; 
                let tfVolume = 0; 
                let sudahSetor = 0; 

                filtered.forEach(pkg => {
                    const stat = String(pkg.status).toLowerCase().replace(' ', '_');
                    const metode = String(pkg.metodeBayar).trim().toUpperCase();
                    const isCair = String(pkg.statusPencairan).toLowerCase() === 'cair';
                    const { hBarang, oDasar, oTambahan, oTotal } = getFinancials(pkg);

                    if (stat === 'sukses') {
                        s_sukses++;
                        let currentSetoran = 0;
                        let currentTfVolume = 0;

                        if (rekapMode === 'olshop') {
                            // --- LOGIKA OLSHOP ---
                            if (metode === 'CASH' || metode === 'COD' || metode === 'TF KANTOR') {
                                currentSetoran = hBarang;
                            }
                            if (metode === 'TF OLSHOP') {
                                currentTfVolume = oTotal;
                            }
                        } else {
                            // --- LOGIKA KURIR ---
                            if (metode === 'CASH' || metode === 'COD') {
                                currentSetoran = hBarang + oDasar;
                            }
                            if (metode === 'TF OLSHOP' || metode === 'TF KANTOR') {
                                currentTfVolume = oTambahan;
                            }
                        }

                        setoran += currentSetoran;
                        tfVolume += currentTfVolume;

                        // SUDAH SETOR / CAIR
                        if (isCair) {
                            sudahSetor += (currentSetoran - currentTfVolume);
                        }

                    } else if (stat === 'pending' || stat === 'siap_antar' || stat === 'proses') { 
                        s_pending++; 
                    } else if (stat === 'cancel') { 
                        s_cancel++; 
                    }
                });

                const estimasiSetoran = setoran - tfVolume;

                return {
                    filteredData: filtered,
                    summary: { sukses: s_sukses, pending: s_pending, cancel: s_cancel, setoran, tfVolume, estimasiSetoran, sudahSetor }
                };
            }, [packages, rekapMode, selectedValue, searchQuery, startDate, endDate]);

            const getIndoDate = (dateStr) => {
                if(!dateStr) return '-';
                try {
                    const d = new Date(dateStr);
                    const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
                    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
                } catch(e) { return dateStr; }
            };

            const displayHeaderDate = () => {
                if (startDate && endDate) {
                    if (startDate === endDate) return getIndoDate(startDate);
                    return `${getIndoDate(startDate)} - ${getIndoDate(endDate)}`;
                } else if (startDate) return `Sejak ${getIndoDate(startDate)}`;
                else if (endDate) return `Hingga ${getIndoDate(endDate)}`;
                return 'Semua Waktu';
            };

            const executeExport = async (format) => {
                if (!printAreaRef.current) return;
                const loadingEl = document.getElementById('export-loading');
                loadingEl.style.display = 'flex'; 

                const currentScrollY = window.scrollY;
                window.scrollTo(0, 0);

                setTimeout(async () => {
                    try {
                        const element = printAreaRef.current;
                        const canvas = await html2canvas(element, { 
                            scale: 2, 
                            useCORS: true, 
                            backgroundColor: '#ffffff',
                            windowWidth: element.scrollWidth,
                            windowHeight: element.scrollHeight
                        });
                        
                        window.scrollTo(0, currentScrollY);

                        const imgData = canvas.toDataURL('image/jpeg', 1.0);
                        const safeFileNameDate = (startDate === endDate && startDate) ? startDate : 'Rentang_Waktu';
                        const fileName = `Rekap_${rekapMode.toUpperCase()}_${selectedValue.replace(/\s+/g, '_')}_${safeFileNameDate}`;

                        if (format === 'jpg') {
                            const link = document.createElement('a');
                            link.href = imgData;
                            link.download = `${fileName}.jpg`;
                            link.click();
                        } else if (format === 'pdf') {
                            const { jsPDF } = window.jspdf;
                            const pdf = new jsPDF('l', 'mm', 'a4');
                            
                            const pdfWidth = pdf.internal.pageSize.getWidth();
                            const pdfHeight = pdf.internal.pageSize.getHeight();
                            
                            const imgWidth = pdfWidth - 20; 
                            const imgHeight = (canvas.height * imgWidth) / canvas.width; 
                            
                            let heightLeft = imgHeight;
                            let position = 10; 
                            
                            pdf.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
                            heightLeft -= (pdfHeight - 20); 
                            
                            while (heightLeft > 0) {
                                position = position - pdfHeight; 
                                pdf.addPage();
                                pdf.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
                                heightLeft -= pdfHeight;
                            }
                            
                            pdf.save(`${fileName}.pdf`);
                        }
                    } catch (err) {
                        console.error("Gagal export:", err);
                        alert("Terjadi kesalahan saat memproses. Pastikan koneksi internet stabil dan tunggu hingga render selesai.");
                    } finally {
                        loadingEl.style.display = 'none';
                    }
                }, 800); 
            };

            return (
                <div className="min-h-screen pb-10">
                    <div className="no-print bg-slate-800 text-white p-4 shadow-md sticky top-0 z-50 flex flex-col gap-4 mb-6">
                        
                        {/* Baris Atas: Judul & Export */}
                        <div className="flex justify-between items-center w-full">
                            <div className="flex items-center gap-3">
                                <div className="bg-orange-500 p-2 rounded-lg shrink-0"><i className="fas fa-file-invoice text-xl"></i></div>
                                <div>
                                    <h1 className="font-bold text-lg leading-tight">Mesin Cetak Rekap</h1>
                                    <p className="text-xs text-slate-300">Exceed Express Ekspedisi</p>
                                </div>
                            </div>
                            
                            <div className="flex gap-2">
                                <button onClick={syncData} disabled={isLoading} className="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded text-sm font-bold border border-blue-500 flex justify-center items-center">
                                    {isLoading ? <i className="fas fa-spin fa-sync-alt"></i> : <i className="fas fa-cloud-download-alt"></i>}
                                </button>
                                <div className="flex bg-slate-900 p-1 rounded-lg border border-slate-700">
                                    <button onClick={() => executeExport('jpg')} disabled={!selectedValue || filteredData.length === 0} className={`px-3 py-1.5 text-xs font-bold rounded flex items-center ${!selectedValue || filteredData.length === 0 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-700 text-blue-400'}`}><i className="fas fa-image mr-1.5 hidden md:inline"></i> JPG</button>
                                    <button onClick={() => executeExport('pdf')} disabled={!selectedValue || filteredData.length === 0} className={`px-3 py-1.5 text-xs font-bold rounded flex items-center border-l border-slate-700 ${!selectedValue || filteredData.length === 0 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-700 text-red-400'}`}><i className="fas fa-file-pdf mr-1.5 hidden md:inline"></i> PDF</button>
                                    <button onClick={() => window.print()} disabled={!selectedValue || filteredData.length === 0} className={`px-4 py-1.5 text-xs font-bold rounded flex items-center border-l border-slate-700 ${!selectedValue || filteredData.length === 0 ? 'opacity-50 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-500 text-white'}`}><i className="fas fa-print mr-1.5 hidden md:inline"></i> Print</button>
                                </div>
                            </div>
                        </div>

                        {/* Baris Bawah: Panel Filter Lengkap */}
                        <div className="flex flex-col lg:flex-row flex-wrap gap-3 w-full bg-slate-900 p-3 rounded-lg border border-slate-700">
                            
                            {/* Toggle Mode */}
                            <div className="flex bg-slate-800 rounded-lg p-1 border border-slate-600 w-full lg:w-auto">
                                <button onClick={() => { setRekapMode('olshop'); setSelectedValue(''); }} className={`flex-1 px-4 py-2 text-xs font-bold rounded transition-colors ${rekapMode === 'olshop' ? 'bg-orange-500 text-white shadow-sm' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="fas fa-store mr-1.5"></i> Rekap Olshop
                                </button>
                                <button onClick={() => { setRekapMode('kurir'); setSelectedValue(''); }} className={`flex-1 px-4 py-2 text-xs font-bold rounded transition-colors ${rekapMode === 'kurir' ? 'bg-orange-500 text-white shadow-sm' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="fas fa-motorcycle mr-1.5"></i> Rekap Kurir
                                </button>
                            </div>

                            {/* Pilihan Nama */}
                            <select value={selectedValue} onChange={(e) => setSelectedValue(e.target.value)} className="bg-slate-700 border border-slate-600 rounded p-2 text-sm outline-none w-full lg:w-48 font-bold text-orange-300 flex-1">
                                <option value="">- Pilih {rekapMode === 'olshop' ? 'Olshop' : 'Kurir'} -</option>
                                {(rekapMode === 'olshop' ? olshopList : kurirList).map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                            </select>

                            {/* Kotak Pencarian */}
                            <div className="relative w-full lg:w-48 flex-1">
                                <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                <input type="text" placeholder="Cari Resi / Nama..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-2 bg-slate-700 border border-slate-600 rounded text-sm outline-none focus:border-orange-500 text-white" />
                            </div>

                            {/* Rentang Tanggal */}
                            <div className="flex items-center gap-2 w-full lg:w-auto">
                                <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="bg-slate-700 border border-slate-600 rounded p-2 text-sm outline-none flex-1 text-slate-200" title="Tanggal Awal" />
                                <span className="text-slate-400 text-xs font-bold">s/d</span>
                                <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="bg-slate-700 border border-slate-600 rounded p-2 text-sm outline-none flex-1 text-slate-200" title="Tanggal Akhir" />
                                {(startDate || endDate) && (<button onClick={() => { setStartDate(''); setEndDate(''); }} className="bg-red-500/20 text-red-400 p-2 rounded hover:bg-red-500/40"><i className="fas fa-times"></i></button>)}
                            </div>

                        </div>
                    </div>

                    {!selectedValue ? (
                        <div className="no-print text-center text-gray-500 mt-20 px-4">
                            <i className={`fas ${rekapMode === 'olshop' ? 'fa-store' : 'fa-motorcycle'} text-5xl mb-4`}></i>
                            <p className="text-lg">Silakan pilih <b>Nama {rekapMode === 'olshop' ? 'Olshop' : 'Kurir'}</b> di panel atas untuk melihat dan mengekspor laporan.</p>
                        </div>
                    ) : (
                        <div ref={printAreaRef} className="cetak-container bg-white mx-auto max-w-[1150px] p-4 sm:p-8 shadow-xl border border-gray-200 flex flex-col min-h-full">
                            
                            {/* KOP SURAT (Dibuat Responsive Flex Column di Mobile) */}
                            <div className="flex flex-col lg:flex-row justify-between items-start mb-6 gap-6">
                                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 w-full lg:w-auto">
                                    <div className="flex flex-col items-center">
                                        <div className="w-[120px] shrink-0 border border-slate-200 rounded p-1 bg-slate-50 flex items-center justify-center">
                                            <img src="https://drive.google.com/uc?id=1xBkWoexBfNOe8WKhDp8WBkh7hjvK4Yub" crossOrigin="anonymous" alt="Exceed Logo" className="w-full h-auto object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                                            <div style={{display: 'none'}} className="w-full h-[50px] bg-[#0f172a] flex-col justify-center items-center text-white italic rounded-sm">
                                                <span className="text-xl font-black text-orange-500">e<span className="text-blue-300">X</span></span>
                                            </div>
                                        </div>
                                        <span className="text-[10px] font-bold italic text-slate-700 mt-1.5 whitespace-nowrap">"Antar tuntas harga pas"</span>
                                    </div>

                                    <div className="flex flex-col gap-1 w-full sm:w-auto mt-2 sm:mt-0">
                                        <div className="border border-black px-4 py-2 sm:py-1.5 font-bold text-sm min-w-[250px] uppercase bg-gray-50 flex items-center w-full">
                                            <span className="text-[10px] text-gray-500 mr-2 border-r border-gray-400 pr-2">{rekapMode === 'olshop' ? 'OLSHOP' : 'KURIR'}</span>
                                            {selectedValue}
                                        </div>
                                        <div className="border border-black px-4 py-2 sm:py-1.5 text-sm font-semibold min-w-[250px] w-full">
                                            {displayHeaderDate()}
                                        </div>
                                    </div>
                                </div>

                                {/* KOTAK RINGKASAN (Lebar 100% di Mobile) */}
                                <div className="flex flex-col sm:flex-row gap-4 w-full lg:w-auto">
                                    <table className="box-summary w-full sm:w-[260px]">
                                        <tbody>
                                            <tr>
                                                <td className="bg-gray-100 w-[40%] sm:w-[140px]">{rekapMode === 'olshop' ? 'Setoran' : 'Setoran (Fisik Cash)'}</td>
                                                <td className="text-right w-[60%] sm:w-[120px]">{formatCurr(summary.setoran)}</td>
                                            </tr>
                                            <tr>
                                                <td className="bg-gray-100">{rekapMode === 'olshop' ? 'TF/VOLUME' : 'Minus Hak (TF/Vol)'}</td>
                                                <td className="text-right text-red-600">{formatCurr(summary.tfVolume)}</td>
                                            </tr>
                                            <tr>
                                                <td className="bg-gray-100">{rekapMode === 'olshop' ? 'Estimasi Setoran' : 'Total Wajib Setor'}</td>
                                                <td className="text-right text-blue-600">{formatCurr(summary.estimasiSetoran)}</td>
                                            </tr>
                                            <tr>
                                                <td className="bg-gray-100">SUDAH SETOR</td>
                                                <td className="text-right text-emerald-600">{formatCurr(summary.sudahSetor)}</td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <table className="box-summary w-full sm:w-[120px]">
                                        <tbody>
                                            <tr><td className="bg-green-400 text-green-900 sm:text-center uppercase tracking-wider w-[70%] sm:w-auto">SUKSES</td><td className="text-right sm:text-center font-black text-lg sm:w-[40px] w-[30%]">{summary.sukses}</td></tr>
                                            <tr><td className="bg-yellow-400 text-yellow-900 sm:text-center uppercase tracking-wider">PENDING</td><td className="text-right sm:text-center font-black text-lg">{summary.pending}</td></tr>
                                            <tr><td className="bg-red-500 text-white sm:text-center uppercase tracking-wider">CANCEL</td><td className="text-right sm:text-center font-black text-lg">{summary.cancel}</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* TABEL DATA PUSAT (Berubah wujud jadi Kartu jika dibuka di HP) */}
                            <table className="excel-table">
                                <thead>
                                    <tr>
                                        <th className="w-8">NO</th>
                                        <th className="w-32">Nama Customer</th>
                                        <th className="w-24">No HP Customer</th>
                                        <th className="w-48">Alamat Lengkap</th>
                                        <th className="w-20">Harga Paket</th>
                                        <th className="w-20">Ongkir Dasar</th>
                                        <th className="w-20">Tambahan Ongkir</th>
                                        <th className="w-20">Total Tagihan</th>
                                        <th className="w-20">Status</th>
                                        <th className="w-20">Metode Bayar</th>
                                        <th className="w-28">{rekapMode === 'olshop' ? 'Kurir ID' : 'Nama Olshop'}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.length === 0 ? (
                                        <tr><td colSpan="11" className="text-center py-8 text-gray-500 font-bold bg-gray-50">Tidak ada data paket untuk laporan ini.</td></tr>
                                    ) : (
                                        filteredData.map((pkg, idx) => {
                                            const stat = String(pkg.status).toUpperCase();
                                            const isPending = stat === 'PENDING' || stat === 'SIAP_ANTAR' || stat === 'PROSES';
                                            const isCancel = stat === 'CANCEL';
                                            const { hBarang, tagihan, oDasar, oTambahan } = getFinancials(pkg);

                                            const baseRowClass = isPending ? "bg-yellow-100 hover:bg-yellow-200" : (isCancel ? "bg-red-100 hover:bg-red-200" : "hover:bg-slate-50");

                                            return (
                                                <tr 
                                                    key={idx} 
                                                    className={`cursor-pointer transition-colors ${baseRowClass}`}
                                                    onClick={() => {
                                                        const foto = getFotoUrl(pkg);
                                                        if (foto) setSelectedImage(foto);
                                                        else alert('Foto bukti tidak tersedia untuk paket ini. Kurir mungkin belum mengunggahnya.');
                                                    }}
                                                    title="Klik baris ini untuk melihat foto bukti"
                                                >
                                                    <td data-label="NO" className="text-center font-bold">{idx + 1}</td>
                                                    <td data-label="Nama Customer" className="font-semibold">{pkg.customerName}</td>
                                                    <td data-label="No HP Customer" className="text-center">{pkg.customerPhone || '-'}</td>
                                                    <td data-label="Alamat Lengkap">{pkg.address}</td>
                                                    <td data-label="Harga Paket" className="text-right">{hBarang === 0 ? '-' : formatCurr(hBarang)}</td>
                                                    <td data-label="Ongkir Dasar" className="text-right">{oDasar === 0 ? '-' : formatCurr(oDasar)}</td>
                                                    <td data-label="Tambahan Ongkir" className="text-right">{oTambahan === 0 ? '-' : formatCurr(oTambahan)}</td>
                                                    <td data-label="Total Tagihan" className="text-right font-bold">{tagihan === 0 ? '-' : formatCurr(tagihan)}</td>
                                                    <td data-label="Status" className={`text-center font-bold ${isPending ? 'text-yellow-700' : (isCancel ? 'text-red-600' : 'text-green-700')}`}>
                                                        {stat === 'SIAP_ANTAR' || stat === 'PROSES' ? 'PENDING' : stat}
                                                    </td>
                                                    <td data-label="Metode Bayar" className="text-center">{pkg.metodeBayar || '-'}</td>
                                                    <td data-label={rekapMode === 'olshop' ? 'Kurir ID' : 'Nama Olshop'} className="text-[10px] uppercase font-bold text-center">
                                                        {rekapMode === 'olshop' ? String(pkg.kurirId || '-').split('@')[0] : pkg.olshopName}
                                                    </td>
                                                </tr>
                                            );
                                        })
                                    )}
                                </tbody>
                            </table>

                            <div className="mt-8 text-center text-[11px] font-bold text-slate-600 border-t-2 border-slate-800 pt-3 flex flex-col items-center justify-center pb-2">
                                <p className="text-sm text-slate-800">Exceed Express Logistics</p>
                                <p className="font-medium mt-0.5 text-slate-500">Alamat Kantor : Jalan Garuda, BTN Bawah Jayapura, Papua.  No. HP 08215006669</p>
                            </div>

                        </div>
                    )}

                    {/* MODAL FOTO BUKTI (Tidak akan ikut tercetak/terdownload) */}
                    {selectedImage && (
                        <div 
                            className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 no-print" 
                            data-html2canvas-ignore="true"
                            onClick={() => setSelectedImage(null)}
                        >
                            <div className="relative w-full max-w-md flex flex-col items-center" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedImage(null)} className="absolute -top-12 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 rounded-full flex items-center justify-center shadow-lg transition-colors"><i className="fas fa-times text-xl"></i></button>
                                <img src={selectedImage} alt="Foto Bukti Paket" className="w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border-4 border-white/10 bg-black/50" />
                                <p className="text-white font-black mt-4 tracking-widest text-sm uppercase flex items-center bg-black/50 px-4 py-2 rounded-full border border-white/10"><i className="fas fa-camera mr-2 text-blue-400"></i> FOTO BUKTI</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
